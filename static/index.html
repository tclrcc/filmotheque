<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Filmotheque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #121110;
    --card: #1C1A17;
    --card-hi: #242019;
    --gold: #D9A441;
    --gold-dim: #8A6A2E;
    --velvet: #A73A46;
    --teal: #2F6E68;
    --ink: #F3EDE4;
    --ink-dim: #A79E92;
    --ink-faint: #6F675C;
    --line: #34302A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Work Sans', sans-serif;
    background: var(--void);
    color: var(--ink);
  }
  h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; margin: 0; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; border-bottom: 1px solid var(--line); padding-bottom: 1.25rem; }
  .header h1 { font-size: 42px; color: var(--gold); }
  .header .sub { font-size: 13px; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .toolbar input[type="text"], .toolbar select {
    background: var(--card); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 12px; border-radius: 8px; font-size: 13px; font-family: 'Work Sans', sans-serif;
  }
  .toolbar input[type="text"] { flex: 1; min-width: 180px; }
  .toolbar select { min-width: 130px; }
  .toolbar input:focus, .toolbar select:focus { outline: none; border-color: var(--gold-dim); }

  .ms-wrap { position: relative; }
  .ms-btn {
    background: var(--card); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: 'Work Sans', sans-serif; white-space: nowrap; max-width: 180px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .ms-btn:hover { border-color: var(--gold-dim); }
  .ms-panel {
    position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--void);
    border: 1px solid var(--line); border-radius: 8px; padding: 6px; z-index: 30;
    min-width: 200px; max-height: 240px; overflow-y: auto; display: none;
  }
  .ms-panel.open { display: block; }
  .ms-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 6px; font-size: 12.5px;
    cursor: pointer; border-radius: 5px; color: var(--ink);
  }
  .ms-item:hover { background: var(--card-hi); }
  .ms-item input { accent-color: var(--gold); cursor: pointer; }
  .ms-empty { font-size: 12px; color: var(--ink-faint); padding: 6px; }

  .range-panel { min-width: 240px; padding: 14px 14px 10px; }
  .range-slider { position: relative; height: 22px; margin: 6px 4px 8px; }
  .range-track { position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: var(--line); border-radius: 2px; transform: translateY(-50%); }
  .range-track-fill { position: absolute; top: 50%; height: 4px; background: var(--gold); border-radius: 2px; transform: translateY(-50%); }
  .range-slider input[type="range"] {
    position: absolute; top: 0; left: 0; width: 100%; margin: 0; background: transparent;
    -webkit-appearance: none; appearance: none; pointer-events: none; height: 22px;
  }
  .range-slider input[type="range"]::-webkit-slider-runnable-track { background: transparent; height: 22px; }
  .range-slider input[type="range"]::-moz-range-track { background: transparent; height: 22px; }
  .range-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; pointer-events: auto; width: 15px; height: 15px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: 2px solid var(--void); margin-top: 4px;
  }
  .range-slider input[type="range"]::-moz-range-thumb {
    pointer-events: auto; width: 15px; height: 15px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: 2px solid var(--void);
  }
  .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-dim); font-family: 'IBM Plex Mono', monospace; padding: 0 2px; }

  .addbtn {
    background: var(--gold); color: #1A1508; border: none; padding: 10px 18px;
    border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .addbtn:hover { background: #E8B65A; }

  .rouletbtn {
    background: none; border: 1px solid var(--velvet); color: var(--velvet); padding: 9px 16px;
    border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.02em;
  }
  .rouletbtn:hover { background: rgba(167,58,70,0.12); }

  .statsbtn, .exportbtn {
    background: none; border: 1px solid var(--line); color: var(--ink-dim); padding: 9px 16px;
    border-radius: 8px; font-weight: 500; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .statsbtn:hover, .exportbtn:hover { border-color: var(--gold-dim); color: var(--ink); }

  .discoverbtn {
    background: var(--teal); border: none; color: #fff; padding: 9px 16px;
    border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .discoverbtn:hover { background: #3A8079; }

  .suggestionsbtn {
    background: var(--velvet); border: none; color: #fff; padding: 9px 16px;
    border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .suggestionsbtn:hover { background: #C24552; }

  .sugg-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: flex-start; justify-content: center; padding: 3vh 1rem; z-index: 65; overflow-y: auto; }
  .sugg-panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px; width: 100%; max-width: 900px; }
  .sugg-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .sugg-header h3 { font-size: 24px; color: var(--velvet); }
  .sugg-close-x { background: none; border: none; color: var(--ink-faint); font-size: 20px; cursor: pointer; }
  .sugg-section-title { font-size: 14px; color: var(--ink-dim); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin: 18px 0 10px; }
  .sugg-message { color: var(--ink-faint); font-size: 13px; padding: 1rem 0; }
  .sugg-backlog-list { display: flex; flex-direction: column; gap: 8px; }
  .sugg-backlog-row { display: flex; align-items: center; gap: 12px; background: var(--card-hi); border-radius: 8px; padding: 8px 12px; }
  .sugg-backlog-row img { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; background: var(--void); flex-shrink: 0; }
  .sugg-backlog-info { flex: 1; min-width: 0; }
  .sugg-backlog-title { font-size: 14px; color: var(--ink); }
  .sugg-backlog-why { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
  .sugg-backlog-why b { color: var(--gold); }

  .discover-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: flex-start; justify-content: center; padding: 3vh 1rem; z-index: 65; overflow-y: auto; }
  .discover-panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px; width: 100%; max-width: 900px; }
  .discover-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .discover-header h3 { font-size: 24px; color: var(--teal); }
  .discover-close-x { background: none; border: none; color: var(--ink-faint); font-size: 20px; cursor: pointer; }
  .discover-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .discover-toolbar select {
    background: var(--void); border: 1px solid var(--line); color: var(--ink);
    padding: 8px 10px; border-radius: 8px; font-size: 12.5px; font-family: 'Work Sans', sans-serif;
  }
  .discover-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .discover-card { background: var(--card-hi); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
  .discover-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--void); }
  .discover-card-body { padding: 8px 9px 10px; flex: 1; display: flex; flex-direction: column; }
  .discover-card-title { font-size: 13px; color: var(--ink); line-height: 1.2; margin-bottom: 3px; }
  .discover-card-meta { font-size: 10.5px; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
  .discover-card-synopsis { font-size: 11px; color: var(--ink-dim); line-height: 1.35; flex: 1; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .discover-add-btn { background: var(--gold); color: #1A1508; border: none; padding: 6px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .discover-add-btn:disabled { background: var(--card-hi); color: var(--ink-faint); border: 1px solid var(--line); cursor: default; }
  .discover-empty { color: var(--ink-faint); font-size: 13px; grid-column: 1/-1; text-align: center; padding: 2rem; }
  .discover-more { display: block; margin: 18px auto 0; background: none; border: 1px solid var(--line); color: var(--ink-dim); padding: 9px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; }

  .stats-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-start; justify-content: center; padding: 4vh 1rem; z-index: 55; overflow-y: auto; }
  .stats-panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 24px; width: 100%; max-width: 620px; }
  .stats-panel h3 { font-size: 24px; color: var(--gold); margin-bottom: 18px; }
  .stats-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 22px; }
  .stats-metric { background: var(--card-hi); border-radius: 8px; padding: 12px 10px; text-align: center; }
  .stats-metric .val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); }
  .stats-metric .lbl { font-size: 10.5px; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .stats-section { margin-bottom: 18px; }
  .stats-section h4 { font-size: 13px; color: var(--ink-dim); font-family: 'IBM Plex Mono', monospace; font-weight: 400; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stats-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12.5px; }
  .stats-bar-label { width: 130px; flex-shrink: 0; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stats-bar-track { flex: 1; background: var(--void); border-radius: 4px; height: 14px; overflow: hidden; }
  .stats-bar-fill { background: var(--gold-dim); height: 100%; }
  .stats-bar-count { width: 20px; text-align: right; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; }
  .stats-empty { color: var(--ink-faint); font-size: 13px; }
  .stats-close { margin-top: 6px; }

  .actor-chip {
    display: inline-flex; align-items: center; gap: 8px; background: var(--card-hi);
    border: 1px solid var(--teal); color: #6FBDB4; font-size: 12px; padding: 5px 10px;
    border-radius: 20px; margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace;
  }
  .actor-chip button { background: none; border: none; color: #6FBDB4; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }

  .count { font-size: 12px; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; margin-bottom: 1rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

  .ticket { background: var(--card); border-radius: 10px; position: relative; display: flex; overflow: hidden; border: 1px solid var(--line); }
  .ticket.vu { opacity: 0.72; }

  .poster { width: 64px; flex-shrink: 0; background: var(--card-hi); object-fit: cover; }
  .poster-placeholder { width: 64px; flex-shrink: 0; background: var(--card-hi); display: flex; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 10px; text-align: center; padding: 4px; }

  .ticket-main { flex: 1; padding: 14px 14px 14px 14px; min-width: 0; }
  .ticket-title { font-size: 19px; color: var(--ink); line-height: 1.15; margin-bottom: 3px; overflow-wrap: break-word; }
  .ticket-year { font-size: 12px; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; }
  .ticket-meta { font-size: 12px; color: var(--ink-dim); margin: 4px 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .realisateur-link { cursor: pointer; text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.15s; }
  .realisateur-link:hover { color: var(--gold); text-decoration-color: var(--gold); }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .tag { font-size: 10.5px; padding: 2px 8px; border-radius: 20px; font-family: 'IBM Plex Mono', monospace; }
  .tag.genre { background: rgba(217,164,65,0.15); color: var(--gold); }
  .tag.actor { background: rgba(47,110,104,0.25); color: #6FBDB4; cursor: pointer; }
  .tag.actor:hover { background: rgba(47,110,104,0.4); }
  .tag.duree { background: rgba(163,163,163,0.15); color: var(--ink-dim); }
  .tag.note-tmdb { background: rgba(217,164,65,0.28); color: var(--gold); font-weight: 600; }
  .tag.pays { background: rgba(111,143,189,0.18); color: #8FB3E0; }

  .synopsis-toggle { background: none; border: none; color: var(--ink-faint); font-size: 11px; cursor: pointer; padding: 0; margin-top: 6px; text-decoration: underline; font-family: 'Work Sans', sans-serif; }
  .synopsis-text { font-size: 12.5px; color: var(--ink-dim); margin-top: 6px; line-height: 1.4; display: none; }
  .synopsis-text.open { display: block; }

  .roulette-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 4vh 1rem; z-index: 60; }
  .roulette-card { background: var(--card); border: 1px solid var(--gold-dim); border-radius: 14px; padding: 28px; width: 100%; max-width: 420px; text-align: center; }
  .roulette-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-faint); letter-spacing: 0.08em; margin-bottom: 10px; }
  .roulette-poster { width: 140px; height: 210px; object-fit: cover; border-radius: 8px; margin: 0 auto 14px; display: block; background: var(--card-hi); }
  .roulette-title { font-size: 26px; color: var(--gold); margin-bottom: 4px; }
  .roulette-meta { font-size: 13px; color: var(--ink-dim); margin-bottom: 16px; }
  .roulette-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
  .comment { font-size: 12.5px; color: var(--ink-dim); font-style: italic; margin-top: 6px; border-left: 2px solid var(--line); padding-left: 8px; }

  .ticket-stub {
    width: 82px; flex-shrink: 0; border-left: 2px dashed var(--line); background: var(--card-hi);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; padding: 10px 4px; position: relative;
  }
  .ticket-stub::before, .ticket-stub::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--void); left: -8px; }
  .ticket-stub::before { top: -7px; }
  .ticket-stub::after { bottom: -7px; }

  .note { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); }
  .note.empty { color: var(--ink-faint); font-size: 13px; font-family: 'Work Sans', sans-serif; }

  .statusbtn { background: none; border: 1px solid var(--line); color: var(--ink-dim); font-size: 10px; padding: 4px 6px; border-radius: 6px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; text-align: center; width: 100%; }
  .statusbtn.vu-active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .delbtn { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 15px; padding: 0; }

  .stub-more-wrap { position: relative; width: 100%; }
  .stub-more-btn {
    width: 100%; background: none; border: 1px solid var(--line); color: var(--ink-faint);
    font-size: 10px; padding: 4px 6px; border-radius: 6px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; text-align: center;
  }
  .stub-more-btn:hover { color: var(--ink); border-color: var(--gold-dim); }
  .stub-more-panel {
    position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--void);
    border: 1px solid var(--line); border-radius: 8px; padding: 4px; min-width: 150px;
    z-index: 40; display: none;
  }
  .stub-more-panel.open { display: block; }
  .stub-more-panel button {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--ink-dim); font-size: 12px; padding: 7px 9px; border-radius: 5px;
    cursor: pointer; font-family: 'IBM Plex Mono', monospace;
  }
  .stub-more-panel button:hover { background: var(--card-hi); color: var(--ink); }
  .stub-more-panel button.danger { color: var(--velvet); }
  .stub-more-panel button.danger:hover { background: rgba(167,58,70,0.12); }
  .delbtn:hover { color: var(--velvet); }

  .empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--ink-faint); font-size: 14px; grid-column: 1/-1; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-start; justify-content: center; padding: 4vh 1rem; z-index: 50; overflow-y: auto; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px; width: 100%; max-width: 520px; }
  .modal h3 { font-size: 22px; color: var(--gold); margin-bottom: 14px; }

  .tmdb-search-wrap { position: relative; margin-bottom: 14px; }
  .tmdb-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--void); border: 1px solid var(--line); border-radius: 8px; margin-top: 4px; max-height: 240px; overflow-y: auto; z-index: 10; }
  .tmdb-result-item { display: flex; gap: 10px; padding: 8px 10px; cursor: pointer; align-items: center; }
  .tmdb-result-item:hover { background: var(--card-hi); }
  .tmdb-result-item img { width: 32px; height: 48px; object-fit: cover; border-radius: 3px; background: var(--card-hi); }
  .tmdb-result-item .rt { font-size: 13px; }
  .tmdb-result-item .ry { font-size: 11px; color: var(--ink-faint); font-family: 'IBM Plex Mono', monospace; }
  .tmdb-status { font-size: 11px; color: var(--ink-faint); margin-top: -8px; margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-grid label { display: block; font-size: 11px; color: var(--ink-faint); margin-bottom: 4px; font-family: 'IBM Plex Mono', monospace; }
  .form-grid input, .form-grid select, .form-grid textarea {
    width: 100%; background: var(--void); border: 1px solid var(--line); color: var(--ink);
    padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: 'Work Sans', sans-serif;
  }
  .form-grid textarea { resize: vertical; min-height: 60px; }
  .form-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid var(--line); color: var(--ink-dim); padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .btn-save { background: var(--gold); color: #1A1508; border: none; padding: 9px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Filmotheque</h1>
    <span class="sub" id="header-sub">SEANCE ILLIMITEE</span>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Chercher un titre, un acteur, un realisateur..." />
    <div class="ms-wrap" id="ms-genre">
      <button type="button" class="ms-btn" id="ms-genre-btn">Tous genres</button>
      <div class="ms-panel" id="ms-genre-panel"></div>
    </div>
    <div class="ms-wrap" id="ms-plateforme">
      <button type="button" class="ms-btn" id="ms-plateforme-btn">Toutes plateformes</button>
      <div class="ms-panel" id="ms-plateforme-panel"></div>
    </div>
    <select id="filter-pays"><option value="">Tous pays</option></select>
    <div class="ms-wrap" id="ms-duree">
      <button type="button" class="ms-btn" id="duree-range-btn">Toutes durees</button>
      <div class="ms-panel range-panel" id="duree-range-panel">
        <div class="range-slider">
          <div class="range-track"></div>
          <div class="range-track-fill" id="duree-track-fill"></div>
          <input type="range" id="duree-min-input" min="0" max="240" step="5" value="0" />
          <input type="range" id="duree-max-input" min="0" max="240" step="5" value="240" />
        </div>
        <div class="range-labels"><span id="duree-min-label">0h</span><span id="duree-max-label">4h+</span></div>
      </div>
    </div>
    <select id="filter-annee">
      <option value="">Toutes annees</option>
      <option value="2019">&lt; 2020</option>
      <option value="2009">&lt; 2010</option>
      <option value="1999">&lt; 2000</option>
      <option value="1989">&lt; 1990</option>
      <option value="1979">&lt; 1980</option>
    </select>
    <select id="filter-status">
      <option value="">Tous statuts</option>
      <option value="avoir">A voir</option>
      <option value="vu">Vu</option>
    </select>

<script>
const API = '';
let films = [];
let editingId = null;
let tmdbSelection = null;
let tmdbSearchTimeout = null;
let activeActor = null;

const grid = document.getElementById('grid');
const modalRoot = document.getElementById('modal-root');
const rouletteRoot = document.getElementById('roulette-root');
const statsRoot = document.getElementById('stats-root');
const discoverRoot = document.getElementById('discover-root');
const suggestionsRoot = document.getElementById('suggestions-root');
const countEl = document.getElementById('count');

let tmdbGenreCache = null;
let tmdbProviderCache = null;
let tmdbGenreMap = {};
const actorChipZone = document.getElementById('actor-chip-zone');
const searchEl = document.getElementById('search');
const paysFilterEl = document.getElementById('filter-pays');
const anneeFilterEl = document.getElementById('filter-annee');
const statusFilterEl = document.getElementById('filter-status');
const sortEl = document.getElementById('sort');
let toolbarPlatformMS = null;
let toolbarGenreMS = null;
let toolbarDureeRange = null;
let activeRealisateur = null;

function escapeHtml(s) {
  return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function splitTags(str) { return (str || '').split(',').map(s => s.trim()).filter(Boolean); }

function formatPlateformes(str, maxShown) {
  const list = splitTags(str);
  if (list.length === 0) return { label: '', full: '' };
  if (list.length <= maxShown) return { label: list.join(', '), full: list.join(', ') };
  return { label: list.slice(0, maxShown).join(', ') + ` +${list.length - maxShown}`, full: list.join(', ') };
}

const COUNTRY_FLAGS = [
  [/france/i, '🇫🇷'], [/(etats-unis|états-unis|united states|usa)/i, '🇺🇸'],
  [/(royaume-uni|united kingdom)/i, '🇬🇧'], [/(coree du sud|corée du sud|south korea)/i, '🇰🇷'],
  [/japon|japan/i, '🇯🇵'], [/italie|italy/i, '🇮🇹'], [/espagne|spain/i, '🇪🇸'],
  [/allemagne|germany/i, '🇩🇪'], [/canada/i, '🇨🇦'], [/belgique|belgium/i, '🇧🇪'],
  [/chine|china/i, '🇨🇳'], [/inde|india/i, '🇮🇳'],
];
function flagFor(paysStr) {
  const first = splitTags(paysStr)[0] || '';
  const match = COUNTRY_FLAGS.find(([re]) => re.test(first));
  return match ? match[1] + ' ' : '';
}

function setupMultiSelect(btnId, panelId, fetchOptions, onChange, defaultLabel) {
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  let selected = new Set();
  let options = [];

  function renderPanel() {
    panel.innerHTML = options.length
      ? options.map(o => `
          <label class="ms-item">
            <input type="checkbox" value="${escapeHtml(String(o.value))}" ${selected.has(String(o.value)) ? 'checked' : ''} />
            ${escapeHtml(o.label)}
          </label>
        `).join('')
      : '<div class="ms-empty">Aucune option pour le moment</div>';
    panel.querySelectorAll('input').forEach(cb => {
      cb.onchange = () => {
        if (cb.checked) selected.add(cb.value); else selected.delete(cb.value);
        updateBtnLabel();
        onChange([...selected]);
      };
    });
  }

  function updateBtnLabel() {
    if (selected.size === 0) { btn.textContent = defaultLabel; return; }
    const labels = options.filter(o => selected.has(String(o.value))).map(o => o.label);
    btn.textContent = selected.size <= 2 ? labels.join(', ') : `${selected.size} plateformes`;
  }

  btn.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll('.ms-panel.open').forEach(p => { if (p !== panel) p.classList.remove('open'); });
    panel.classList.toggle('open');
  };
  document.addEventListener('click', (e) => {
    if (!panel.contains(e.target) && e.target !== btn) panel.classList.remove('open');
  });

  return {
    async loadOptions() {
      options = await fetchOptions();
      renderPanel();
      updateBtnLabel();
    },
    getSelected: () => [...selected],
    reset() {
      selected = new Set();
      updateBtnLabel();
      renderPanel();
    },
  };
}

const DUREE_RANGE_MAX = 240;
function fmtDuree(v) {
  if (v >= DUREE_RANGE_MAX) return '4h+';
  const h = Math.floor(v / 60), m = v % 60;
  return m ? `${h}h${String(m).padStart(2, '0')}` : `${h}h`;
}

function setupDurationRange(prefix, onChange) {
  const minInput = document.getElementById(`${prefix}-min-input`);
  const maxInput = document.getElementById(`${prefix}-max-input`);
  const fill = document.getElementById(`${prefix}-track-fill`);
  const minLabel = document.getElementById(`${prefix}-min-label`);
  const maxLabel = document.getElementById(`${prefix}-max-label`);
  const btn = document.getElementById(`${prefix}-range-btn`);
  const panel = document.getElementById(`${prefix}-range-panel`);
  let debounceT;

  function refresh(fire) {
    let minV = parseInt(minInput.value, 10);
    let maxV = parseInt(maxInput.value, 10);
    if (minV > maxV) { minV = maxV; minInput.value = minV; }
    fill.style.left = (minV / DUREE_RANGE_MAX * 100) + '%';
    fill.style.width = ((maxV - minV) / DUREE_RANGE_MAX * 100) + '%';
    minLabel.textContent = fmtDuree(minV);
    maxLabel.textContent = fmtDuree(maxV);
    btn.textContent = (minV === 0 && maxV >= DUREE_RANGE_MAX) ? 'Toutes durees' : `${fmtDuree(minV)} - ${fmtDuree(maxV)}`;
    if (fire) {
      clearTimeout(debounceT);
      debounceT = setTimeout(() => onChange(), 300);
    }
  }

  minInput.oninput = () => refresh(true);
  maxInput.oninput = () => refresh(true);
  refresh(false);

  btn.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll('.ms-panel.open').forEach(p => { if (p !== panel) p.classList.remove('open'); });
    panel.classList.toggle('open');
  };
  document.addEventListener('click', (e) => {
    if (!panel.contains(e.target) && e.target !== btn) panel.classList.remove('open');
  });

  return {
    getValue() {
      const minV = parseInt(minInput.value, 10);
      const maxV = parseInt(maxInput.value, 10);
      return { duree_min: minV > 0 ? minV : null, duree_max: maxV < DUREE_RANGE_MAX ? maxV : null };
    },
    reset() {
      minInput.value = 0;
      maxInput.value = DUREE_RANGE_MAX;
      refresh(false);
    },
  };
}

async function loadFilms() {
  const params = new URLSearchParams();
  if (searchEl.value.trim()) params.set('search', searchEl.value.trim());
  if (toolbarGenreMS) toolbarGenreMS.getSelected().forEach(g => params.append('genre', g));
  if (toolbarPlatformMS) toolbarPlatformMS.getSelected().forEach(p => params.append('plateforme', p));
  if (paysFilterEl.value) params.set('pays', paysFilterEl.value);
  if (toolbarDureeRange) {
    const dv = toolbarDureeRange.getValue();
    if (dv.duree_max) params.set('duree_max', dv.duree_max);
    if (dv.duree_min) params.set('duree_min', dv.duree_min);
  }
  if (anneeFilterEl.value) params.set('annee_max', anneeFilterEl.value);
  if (statusFilterEl.value) params.set('statut', statusFilterEl.value);
  if (activeActor) params.set('acteur', activeActor);
  if (activeRealisateur) params.set('realisateur', activeRealisateur);
  params.set('sort', sortEl.value);

  const res = await fetch(`${API}/api/films?${params.toString()}`);
  films = await res.json();
  renderActorChip();
  render();
}

function renderActorChip() {
  const chips = [];
  if (activeActor) {
    chips.push(`<div class="actor-chip">Acteur : ${escapeHtml(activeActor)} <button id="clear-actor-chip">&times;</button></div>`);
  }
  if (activeRealisateur) {
    chips.push(`<div class="actor-chip">Realisateur : ${escapeHtml(activeRealisateur)} <button id="clear-realisateur-chip">&times;</button></div>`);
  }
  actorChipZone.innerHTML = chips.join(' ');
  const clearActor = document.getElementById('clear-actor-chip');
  if (clearActor) clearActor.onclick = () => { activeActor = null; loadFilms(); };
  const clearReal = document.getElementById('clear-realisateur-chip');
  if (clearReal) clearReal.onclick = () => { activeRealisateur = null; loadFilms(); };
}

function filterByActor(name) {
  activeActor = name;
  loadFilms();
}

function filterByRealisateur(name) {
  activeRealisateur = name;
  loadFilms();
}

function initToolbarGenreMS() {
  if (toolbarGenreMS) return toolbarGenreMS.loadOptions();
  toolbarGenreMS = setupMultiSelect(
    'ms-genre-btn', 'ms-genre-panel',
    async () => {
      const res = await fetch(`${API}/api/meta/genres`);
      const list = res.ok ? await res.json() : [];
      return list.map(g => ({ value: g, label: g }));
    },
    () => loadFilms(),
    'Tous genres'
  );
  return toolbarGenreMS.loadOptions();
}

function initToolbarPlatformMS() {
  if (toolbarPlatformMS) return toolbarPlatformMS.loadOptions();
  toolbarPlatformMS = setupMultiSelect(
    'ms-plateforme-btn', 'ms-plateforme-panel',
    async () => {
      const res = await fetch(`${API}/api/meta/plateformes`);
      const list = res.ok ? await res.json() : [];
      return list.map(p => ({ value: p, label: p }));
    },
    () => loadFilms(),
    'Toutes plateformes'
  );
  return toolbarPlatformMS.loadOptions();
}

async function loadPays() {
  const res = await fetch(`${API}/api/meta/pays`);
  const pays = await res.json();
  const current = paysFilterEl.value;
  paysFilterEl.innerHTML = '<option value="">Tous pays</option>' +
    pays.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
  paysFilterEl.value = current;
}

function render() {
  countEl.textContent = `${films.length} film${films.length > 1 ? 's' : ''} affiche${films.length > 1 ? 's' : ''}`;

  if (films.length === 0) {
    grid.innerHTML = `<div class="empty-state">Aucun film ici. Ajoute ton premier film avec le bouton ci-dessus.</div>`;
    return;
  }

  grid.innerHTML = films.map(f => {
    const genres = splitTags(f.genres);
    const acteurs = splitTags(f.acteurs);
    const posterHtml = f.poster_url
      ? `<img class="poster" src="${escapeHtml(f.poster_url)}" alt="" />`
      : `<div class="poster-placeholder">${escapeHtml((f.titre || '?').slice(0,1))}</div>`;
    const dureeLabel = f.duree_minutes ? `${Math.floor(f.duree_minutes / 60)}h${String(f.duree_minutes % 60).padStart(2, '0')}` : null;
    const synopsisId = `syn-${f.id}`;
    return `
      <div class="ticket ${f.statut === 'vu' ? 'vu' : ''}">
        ${posterHtml}
        <div class="ticket-main">
          <div class="ticket-title">${escapeHtml(f.titre)} ${f.annee ? `<span class="ticket-year">(${f.annee})</span>` : ''}</div>
          <div class="ticket-meta" ${f.plateforme && splitTags(f.plateforme).length > 2 ? `title="${escapeHtml(formatPlateformes(f.plateforme, 2).full)}"` : ''}>${f.realisateur ? `<span class="realisateur-link" data-realisateur="${escapeHtml(f.realisateur)}">${escapeHtml(f.realisateur)}</span>` : ''}${f.realisateur && f.plateforme ? ' &middot; ' : ''}${escapeHtml(formatPlateformes(f.plateforme, 2).label)}</div>
          <div class="tags">
            ${genres.map(g => `<span class="tag genre">${escapeHtml(g)}</span>`).join('')}
            ${acteurs.slice(0, 3).map(a => `<span class="tag actor" data-actor="${escapeHtml(a)}">${escapeHtml(a)}</span>`).join('')}
            ${dureeLabel ? `<span class="tag duree">${dureeLabel}</span>` : ''}
            ${f.note_tmdb ? `<span class="tag note-tmdb">TMDb ${f.note_tmdb}</span>` : ''}
            ${f.pays ? `<span class="tag pays">${flagFor(f.pays)}${escapeHtml(f.pays)}</span>` : ''}
          </div>
          ${f.statut === 'vu' && f.commentaire ? `<div class="comment">${escapeHtml(f.commentaire)}</div>` : ''}
          ${f.synopsis ? `
            <button class="synopsis-toggle" data-toggle-synopsis="${synopsisId}">Synopsis</button>
            <div class="synopsis-text" id="${synopsisId}">${escapeHtml(f.synopsis)}</div>
          ` : ''}
        </div>
        <div class="ticket-stub">
          ${f.note !== null && f.note !== undefined ? `<div class="note">${f.note}</div>` : `<div class="note empty">--</div>`}
          <button class="statusbtn ${f.statut === 'vu' ? 'vu-active' : ''}" data-action="toggle" data-id="${f.id}">${f.statut === 'vu' ? 'VU' : 'A VOIR'}</button>
          <div class="stub-more-wrap">
            <button class="stub-more-btn" data-more-toggle="${f.id}">&#8942; Plus</button>
            <div class="stub-more-panel" id="stub-more-${f.id}">
              <button data-action="edit" data-id="${f.id}">Editer</button>
              ${f.tmdb_id ? `<button data-action="similar" data-tmdb-id="${f.tmdb_id}" data-titre="${escapeHtml(f.titre)}">Similaires</button>` : ''}
              ${f.tmdb_id ? `<button data-action="trailer" data-tmdb-id="${f.tmdb_id}">Bande-annonce</button>` : ''}
              <button data-action="delete" data-id="${f.id}" class="danger">Supprimer</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('[data-action]').forEach(btn => {
    const id = parseInt(btn.getAttribute('data-id'), 10);
    const action = btn.getAttribute('data-action');
    btn.onclick = () => {
      if (action === 'toggle') toggleStatus(id);
      else if (action === 'delete') deleteFilm(id);
      else if (action === 'edit') openModal(films.find(f => f.id === id));
      else if (action === 'similar') openDiscover({ mode: 'similar', tmdbId: parseInt(btn.getAttribute('data-tmdb-id'), 10), sourceTitre: btn.getAttribute('data-titre') });
      else if (action === 'trailer') openTrailer(parseInt(btn.getAttribute('data-tmdb-id'), 10), btn);
    };
  });

  grid.querySelectorAll('[data-more-toggle]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const panel = document.getElementById(`stub-more-${btn.getAttribute('data-more-toggle')}`);
      const isOpen = panel.classList.contains('open');
      grid.querySelectorAll('.stub-more-panel.open').forEach(p => p.classList.remove('open'));
      if (!isOpen) panel.classList.add('open');
    };
  });

  grid.querySelectorAll('.tag.actor').forEach(tag => {
    tag.onclick = () => filterByActor(tag.getAttribute('data-actor'));
  });

  grid.querySelectorAll('.realisateur-link').forEach(el => {
    el.onclick = () => filterByRealisateur(el.getAttribute('data-realisateur'));
  });

  grid.querySelectorAll('[data-toggle-synopsis]').forEach(btn => {
    btn.onclick = () => {
      const el = document.getElementById(btn.getAttribute('data-toggle-synopsis'));
      el.classList.toggle('open');
      btn.textContent = el.classList.contains('open') ? 'Masquer le synopsis' : 'Synopsis';
    };
  });
}

async function toggleStatus(id) {
  const f = films.find(x => x.id === id);
  await fetch(`${API}/api/films/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ statut: f.statut === 'vu' ? 'avoir' : 'vu' }),
  });
  await loadFilms();
  if (toolbarGenreMS) await toolbarGenreMS.loadOptions();
}

async function deleteFilm(id) {
  if (!confirm('Retirer ce film de la filmotheque ?')) return;
  await fetch(`${API}/api/films/${id}`, { method: 'DELETE' });
  await loadFilms();
  if (toolbarGenreMS) await toolbarGenreMS.loadOptions();
}

function openModal(existing) {
  editingId = existing ? existing.id : null;
  tmdbSelection = existing ? {
    tmdb_id: existing.tmdb_id, poster_url: existing.poster_url,
  } : null;
  const f = existing || { titre: '', annee: '', genres: '', acteurs: '', realisateur: '', plateforme: '', note: '', statut: 'avoir', commentaire: '', duree_minutes: '', synopsis: '', note_tmdb: '', pays: '' };

  modalRoot.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal">
        <h3>${existing ? 'Modifier' : 'Nouveau film'}</h3>
        ${existing ? '' : `
          <div class="tmdb-search-wrap">
            <label style="display:block;font-size:11px;color:var(--ink-faint);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;">Rechercher sur TMDb (pre-remplissage automatique)</label>
            <input type="text" id="tmdb-search" placeholder="Tape un titre de film..." autocomplete="off" />
            <div class="tmdb-results" id="tmdb-results" style="display:none;"></div>
          </div>
          <div class="tmdb-status" id="tmdb-status"></div>
        `}
        <div class="form-grid">
          <div class="full">
            <label>Titre</label>
            <input type="text" id="f-titre" value="${escapeHtml(f.titre)}" placeholder="Le nom du film" />
          </div>
          <div>
            <label>Annee</label>
            <input type="text" id="f-annee" value="${escapeHtml(f.annee || '')}" placeholder="2024" />
          </div>
          <div>
            <label>Plateforme</label>
            <input type="text" id="f-plateforme" value="${escapeHtml(f.plateforme)}" placeholder="Netflix, Cinema..." />
            ${existing && existing.tmdb_id ? `<button type="button" id="refresh-providers-btn" style="margin-top:6px;background:none;border:1px solid var(--line);color:var(--ink-faint);font-size:10.5px;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;">Actualiser fiche TMDb</button>` : ''}
          </div>
          <div class="full">
            <label>Genres (separes par virgule)</label>
            <input type="text" id="f-genres" value="${escapeHtml(f.genres)}" placeholder="Thriller, Drame" />
          </div>
          <div class="full">
            <label>Acteurs (separes par virgule)</label>
            <input type="text" id="f-acteurs" value="${escapeHtml(f.acteurs)}" placeholder="Marion Cotillard, ..." />
          </div>
          <div>
            <label>Realisateur</label>
            <input type="text" id="f-real" value="${escapeHtml(f.realisateur)}" />
          </div>
          <div>
            <label>Duree (minutes)</label>
            <input type="text" id="f-duree" value="${escapeHtml(f.duree_minutes || '')}" placeholder="170" />
          </div>
          <div>
            <label>Pays</label>
            <input type="text" id="f-pays" value="${escapeHtml(f.pays || '')}" placeholder="France, Etats-Unis..." />
          </div>
          <div>
            <label>Statut</label>
            <select id="f-statut">
              <option value="avoir" ${f.statut === 'avoir' ? 'selected' : ''}>A voir</option>
              <option value="vu" ${f.statut === 'vu' ? 'selected' : ''}>Vu</option>
            </select>
          </div>
          <div>
            <label>Note /10 (si vu)</label>
            <input type="text" id="f-note" value="${escapeHtml(f.note != null ? f.note : '')}" placeholder="8.5" />
          </div>
          <div>
            <label>Note TMDb (communaute)</label>
            <input type="text" id="f-note-tmdb" value="${escapeHtml(f.note_tmdb != null ? f.note_tmdb : '')}" placeholder="7.8" />
          </div>
          <div class="full">
            <label>Synopsis</label>
            <textarea id="f-synopsis" placeholder="Resume du film...">${escapeHtml(f.synopsis || '')}</textarea>
          </div>
          <div class="full">
            <label>Commentaire (si vu)</label>
            <textarea id="f-commentaire" placeholder="Ton avis, une scene marquante...">${escapeHtml(f.commentaire || '')}</textarea>
          </div>
        </div>
        <div class="form-actions">

  document.getElementById('modal-cancel').onclick = closeModal;

  if (refreshBtn) {

function closeModal() {
  modalRoot.innerHTML = '';
  editingId = null;
  tmdbSelection = null;
}

function onTmdbSearchInput(e) {
  clearTimeout(tmdbSearchTimeout);
  const q = e.target.value.trim();
  const resultsEl = document.getElementById('tmdb-results');
  if (q.length < 2) { resultsEl.style.display = 'none'; return; }
  tmdbSearchTimeout = setTimeout(async () => {
    try {
      const res = await fetch(`${API}/api/tmdb/search?q=${encodeURIComponent(q)}`);
      if (!res.ok) {
        const err = await res.json();
        document.getElementById('tmdb-status').textContent = err.detail || 'Erreur TMDb';
        resultsEl.style.display = 'none';
        return;
      }
      const results = await res.json();
      if (results.length === 0) { resultsEl.style.display = 'none'; return; }
      resultsEl.innerHTML = results.map(r => `
        <div class="tmdb-result-item" data-tmdb-id="${r.tmdb_id}">
          <img src="${r.poster_url || ''}" alt="" />
          <div>
            <div class="rt">${escapeHtml(r.titre)}</div>
            <div class="ry">${r.annee || ''}</div>
          </div>
        </div>
      `).join('');
      resultsEl.style.display = 'block';
      resultsEl.querySelectorAll('.tmdb-result-item').forEach(item => {
        item.onclick = () => selectTmdbMovie(parseInt(item.getAttribute('data-tmdb-id'), 10));
      });
    } catch (err) {
      document.getElementById('tmdb-status').textContent = 'Erreur reseau TMDb';
    }
  }, 350);
}

async function selectTmdbMovie(tmdbId) {
  document.getElementById('tmdb-status').textContent = 'Chargement des details...';
  document.getElementById('tmdb-results').style.display = 'none';
  try {
    const res = await fetch(`${API}/api/tmdb/movie/${tmdbId}`);
    const d = await res.json();
    document.getElementById('f-titre').value = d.titre || '';
    document.getElementById('f-annee').value = d.annee || '';
    document.getElementById('f-genres').value = d.genres || '';
    document.getElementById('f-acteurs').value = d.acteurs || '';
    document.getElementById('f-real').value = d.realisateur || '';
    document.getElementById('f-duree').value = d.duree_minutes || '';
    document.getElementById('f-synopsis').value = d.synopsis || '';
    document.getElementById('f-note-tmdb').value = d.note_tmdb != null ? d.note_tmdb : '';
    document.getElementById('f-pays').value = d.pays || '';
    if (d.plateformes_fr && d.plateformes_fr.length > 0) {
      document.getElementById('f-plateforme').value = d.plateformes_fr.join(', ');
    }
    tmdbSelection = { tmdb_id: d.tmdb_id, poster_url: d.poster_url };
    const provInfo = d.plateformes_fr && d.plateformes_fr.length > 0
      ? ` Dispo FR : ${d.plateformes_fr.join(', ')}.`
      : ' Aucune plateforme FR trouvee sur TMDb.';
    document.getElementById('tmdb-status').textContent = 'Fiche pre-remplie depuis TMDb.' + provInfo;
  } catch (err) {
    document.getElementById('tmdb-status').textContent = 'Impossible de charger les details TMDb.';
  }
}

async function onSaveModal() {
  const titre = document.getElementById('f-titre').value.trim();
  if (!titre) return;
  const noteRaw = document.getElementById('f-note').value.trim();
  const noteTmdbRaw = document.getElementById('f-note-tmdb').value.trim();
  const dureeRaw = document.getElementById('f-duree').value.trim();
  const payload = {
    titre,
    annee: parseInt(document.getElementById('f-annee').value, 10) || null,
    genres: document.getElementById('f-genres').value.trim(),
    acteurs: document.getElementById('f-acteurs').value.trim(),
    realisateur: document.getElementById('f-real').value.trim(),
    plateforme: document.getElementById('f-plateforme').value.trim(),
    statut: document.getElementById('f-statut').value,
    note: noteRaw ? parseFloat(noteRaw) : null,
    commentaire: document.getElementById('f-commentaire').value.trim(),
    duree_minutes: dureeRaw ? parseInt(dureeRaw, 10) : null,
    synopsis: document.getElementById('f-synopsis').value.trim(),
    note_tmdb: noteTmdbRaw ? parseFloat(noteTmdbRaw) : null,
    pays: document.getElementById('f-pays').value.trim(),
  };
  if (tmdbSelection) {
    payload.tmdb_id = tmdbSelection.tmdb_id;
    payload.poster_url = tmdbSelection.poster_url;
  }

  if (editingId) {
    await fetch(`${API}/api/films/${editingId}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });

async function ensureTmdbMeta() {

      const res = await fetch(`${API}/api/tmdb/genres`);

      tmdbGenreMap = {};
      tmdbGenreCache.forEach(g => { tmdbGenreMap[g.id] = g.name; });
    } catch (e) { tmdbGenreCache = []; }
  }
  if (!tmdbProviderCache) {
    try {
      const res = await fetch(`${API}/api/tmdb/watch-providers`);
      tmdbProviderCache = res.ok ? await res.json() : [];
    } catch (e) { tmdbProviderCache = []; }
  }
}

        resultsEl.innerHTML = people.map(p => `

async function runDiscover(page) {
  discoverState.page = page;
  const gridEl = document.getElementById('discover-grid');
  const moreZone = document.getElementById('discover-more-zone');
  if (page === 1) { gridEl.innerHTML = '<div class="discover-empty">Chargement...</div>'; moreZone.innerHTML = ''; }

  let url;
  if (discoverState.mode === 'similar') {
    url = `${API}/api/tmdb/similar/${discoverState.tmdbId}?page=${page}`;
  } else if (discoverState.mode === 'director') {
    url = `${API}/api/tmdb/director/${discoverState.personId}`;
  } else {
    const params = new URLSearchParams({ sort_by: document.getElementById('disc-sort').value, page });
    const genreVals = discGenreMS ? discGenreMS.getSelected() : [];
    const providerVals = discProviderMS ? discProviderMS.getSelected() : [];
    const paysVal = document.getElementById('disc-pays').value;
    const anneeVal = document.getElementById('disc-annee').value;
    const noteVal = document.getElementById('disc-note').value;
    if (genreVals.length) params.set('genre_id', genreVals.join('|'));
    if (providerVals.length) params.set('provider_id', providerVals.join('|'));
    if (paysVal) params.set('origin_country', paysVal);
    if (discDureeRange) {
      const dv = discDureeRange.getValue();
      if (dv.duree_max) params.set('duree_max', dv.duree_max);
      if (dv.duree_min) params.set('duree_min', dv.duree_min);
    }
    if (anneeVal) params.set('annee_max', anneeVal);
    if (noteVal) params.set('note_min', noteVal);
    url = `${API}/api/tmdb/discover?${params.toString()}`;
  }

  let data;
  try {
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json();
      gridEl.innerHTML = `<div class="discover-empty">${escapeHtml(err.detail || 'Erreur TMDb')}</div>`;
      return;
    }
    data = await res.json();
    if (discoverState.mode === 'director') {
      data = { page: 1, total_pages: 1, results: data.results };
    }
  } catch (e) {
    gridEl.innerHTML = '<div class="discover-empty">Erreur reseau TMDb.</div>';
    return;
  }

  const filteredResults = data.results.filter(r => !watchlistTmdbIds.has(r.tmdb_id));

  if (page === 1) discoverState.results = filteredResults;
  else discoverState.results = discoverState.results.concat(filteredResults);

  if (discoverState.results.length === 0) {
    gridEl.innerHTML = data.page < data.total_pages
      ? '<div class="discover-empty">Tous les resultats de cette page sont deja dans ta liste. Charge la suite.</div>'
      : '<div class="discover-empty">Aucun resultat pour ces criteres (ou tout est deja dans ta liste).</div>';
    moreZone.innerHTML = data.page < data.total_pages
      ? `<button class="discover-more" id="discover-load-more">Charger plus</button>`
      : '';
    const moreBtnEmpty = document.getElementById('discover-load-more');
    if (moreBtnEmpty) moreBtnEmpty.onclick = () => runDiscover(discoverState.page + 1);
    return;
  }

  gridEl.innerHTML = discoverState.results.map(r => {
    const genreNames = (r.genre_ids || []).map(id => tmdbGenreMap[id]).filter(Boolean).slice(0, 2);
    const already = discoverState.addedIds.has(r.tmdb_id);
    return `
      <div class="discover-card">
        ${r.poster_url ? `<img src="${escapeHtml(r.poster_url)}" alt="" />` : `<div style="aspect-ratio:2/3;background:var(--void);"></div>`}
        <div class="discover-card-body">
          <div class="discover-card-title">${escapeHtml(r.titre)}</div>
          <div class="discover-card-meta">${r.annee || ''}${genreNames.length ? ' &middot; ' + genreNames.join(', ') : ''}${r.note_tmdb ? ' &middot; ' + r.note_tmdb + '/10' : ''}</div>
          <div class="discover-card-synopsis">${escapeHtml(r.synopsis || 'Pas de synopsis disponible.')}</div>
          <div style="display:flex;gap:6px;">
            <button class="discover-add-btn" data-add-tmdb="${r.tmdb_id}" ${already ? 'disabled' : ''}>${already ? 'Ajoute' : '+ Ajouter'}</button>
            <button class="discover-add-btn" style="background:none;border:1px solid var(--line);color:var(--ink-dim);" data-trailer-tmdb="${r.tmdb_id}">BA</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  gridEl.querySelectorAll('[data-add-tmdb]').forEach(btn => {
    btn.onclick = () => addFromDiscover(parseInt(btn.getAttribute('data-add-tmdb'), 10), btn);
  });

  gridEl.querySelectorAll('[data-trailer-tmdb]').forEach(btn => {
    btn.onclick = () => openTrailer(parseInt(btn.getAttribute('data-trailer-tmdb'), 10), btn);
  });

  moreZone.innerHTML = data.page < data.total_pages
    ? `<button class="discover-more" id="discover-load-more">Charger plus</button>`
    : '';
  const moreBtn = document.getElementById('discover-load-more');
  if (moreBtn) moreBtn.onclick = () => runDiscover(discoverState.page + 1);
}

async function openTrailer(tmdbId, btn) {
  const original = btn.textContent;
  btn.textContent = 'Recherche...';
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/tmdb/trailer/${tmdbId}`);
    if (!res.ok) {
      const err = await res.json();
      btn.textContent = err.detail && err.detail.includes('Aucune') ? 'Pas de BA trouvee' : 'Erreur';
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
      return;
    }
    const d = await res.json();
    window.open(d.youtube_url, '_blank', 'noopener');
    btn.textContent = original;
    btn.disabled = false;
  } catch (e) {
    btn.textContent = 'Erreur';
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
  }
}

async function addFromDiscover(tmdbId, btn) {
  btn.textContent = 'Ajout...';
  btn.disabled = true;
  try {
    const detailRes = await fetch(`${API}/api/tmdb/movie/${tmdbId}`);
    const d = await detailRes.json();
    const payload = {
      titre: d.titre, tmdb_id: d.tmdb_id, annee: d.annee ? parseInt(d.annee, 10) : null,
      genres: d.genres || '', acteurs: d.acteurs || '', realisateur: d.realisateur || '',
      plateforme: d.plateformes_fr && d.plateformes_fr.length ? d.plateformes_fr.join(', ') : '',
      poster_url: d.poster_url, statut: 'avoir', duree_minutes: d.duree_minutes,
      synopsis: d.synopsis || '', note_tmdb: d.note_tmdb, pays: d.pays || '',
    };
    await fetch(`${API}/api/films`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    watchlistTmdbIds.add(tmdbId);
    discoverState.results = discoverState.results.filter(r => r.tmdb_id !== tmdbId);
    const card = btn.closest('.discover-card');
    if (card) card.remove();
    await loadFilms();
    if (toolbarGenreMS) await toolbarGenreMS.loadOptions();
    if (toolbarPlatformMS) await toolbarPlatformMS.loadOptions();
    await loadPays();
  } catch (e) {
    btn.textContent = 'Erreur';
    btn.disabled = false;
  }
}

// --- Suggestions personnalisees (basees sur tes notes) ---

async function openSuggestions() {
  suggestionsRoot.innerHTML = `
    <div class="sugg-backdrop" id="sugg-backdrop">
      <div class="sugg-panel">
        <div class="sugg-header">
          <h3>Suggestions pour toi</h3>
          <button class="sugg-close-x" id="sugg-close-x">&times;</button>
        </div>
        <div style="font-size:12px;color:var(--ink-faint);">Basees sur les notes que tu as donnees a tes films vus.</div>
        <div id="sugg-body"><div class="sugg-message">Analyse de tes gouts en cours...</div></div>
      </div>
    </div>
  `;
  document.getElementById('sugg-backdrop').onclick = (e) => { if (e.target.id === 'sugg-backdrop') closeSuggestions(); };
  document.getElementById('sugg-close-x').onclick = closeSuggestions;

  await refreshWatchlistTmdbIds();
  const body = document.getElementById('sugg-body');

  let backlogData, discoverData;
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${API}/api/suggestions/backlog`),
      fetch(`${API}/api/suggestions/discover`),
    ]);
    backlogData = await r1.json();
    discoverData = await r2.json();
  } catch (e) {
    body.innerHTML = '<div class="sugg-message">Erreur reseau pendant le calcul des suggestions.</div>';
    return;
  }

  let html = '';

  html += '<div class="sugg-section-title">Dans ta liste "a voir", par ordre de priorite</div>';
  if (backlogData.message) {
    html += `<div class="sugg-message">${escapeHtml(backlogData.message)}</div>`;
  } else {
    html += '<div class="sugg-backlog-list">';
    html += backlogData.suggestions.map(f => {
      const why = f.genres_matches && f.genres_matches.length
        ? `Correspond a ton gout pour : <b>${f.genres_matches.map(escapeHtml).join(', ')}</b>`
        : (f.score > 0 ? 'Realisateur que tu apprecies' : 'Peu de correspondance avec tes gouts actuels');
      const posterHtml = f.poster_url ? `<img src="${escapeHtml(f.poster_url)}" alt="" />` : '<div style="width:40px;height:60px;background:var(--void);border-radius:4px;flex-shrink:0;"></div>';
      return `
        <div class="sugg-backlog-row">
          ${posterHtml}
          <div class="sugg-backlog-info">
            <div class="sugg-backlog-title">${escapeHtml(f.titre)}${f.annee ? ' (' + f.annee + ')' : ''}</div>
            <div class="sugg-backlog-why">${why}</div>
          </div>
          ${f.tmdb_id ? `<button class="statusbtn" data-sugg-trailer="${f.tmdb_id}" style="width:auto;padding:6px 10px;">BA</button>` : ''}
          <button class="statusbtn vu-active" style="width:auto;padding:6px 10px;" data-sugg-watch="${f.id}">Marquer vu</button>
        </div>
      `;
    }).join('');
    html += '</div>';
  }

  html += '<div class="sugg-section-title">Nouvelles decouvertes qui devraient te plaire</div>';
  if (discoverData.message) {
    html += `<div class="sugg-message">${escapeHtml(discoverData.message)}</div>`;
  } else {
    html += discoverData.genre_utilise
      ? `<div style="font-size:12px;color:var(--ink-faint);margin-bottom:10px;">Deduit de ton gout marque pour : <b style="color:var(--gold);">${escapeHtml(discoverData.genre_utilise)}</b></div>`
      : '';
    html += '<div class="discover-grid">';
    html += discoverData.results.map(r => `
      <div class="discover-card">
        ${r.poster_url ? `<img src="${escapeHtml(r.poster_url)}" alt="" />` : `<div style="aspect-ratio:2/3;background:var(--void);"></div>`}
        <div class="discover-card-body">
          <div class="discover-card-title">${escapeHtml(r.titre)}</div>
          <div class="discover-card-meta">${r.annee || ''}${r.note_tmdb ? ' &middot; ' + r.note_tmdb + '/10' : ''}</div>
          <div class="discover-card-synopsis">${escapeHtml(r.synopsis || 'Pas de synopsis disponible.')}</div>
          <div style="display:flex;gap:6px;">
            <button class="discover-add-btn" data-add-tmdb="${r.tmdb_id}">+ Ajouter</button>
            <button class="discover-add-btn" style="background:none;border:1px solid var(--line);color:var(--ink-dim);" data-trailer-tmdb="${r.tmdb_id}">BA</button>
          </div>
        </div>
      </div>
    `).join('');
    html += '</div>';
  }

  body.innerHTML = html;

  body.querySelectorAll('[data-sugg-watch]').forEach(btn => {
    btn.onclick = async () => {
      await toggleStatus(parseInt(btn.getAttribute('data-sugg-watch'), 10));
      closeSuggestions();
    };
  });
  body.querySelectorAll('[data-sugg-trailer]').forEach(btn => {
    btn.onclick = () => openTrailer(parseInt(btn.getAttribute('data-sugg-trailer'), 10), btn);
  });
  body.querySelectorAll('[data-add-tmdb]').forEach(btn => {
    btn.onclick = () => addFromDiscover(parseInt(btn.getAttribute('data-add-tmdb'), 10), btn);
  });
  body.querySelectorAll('[data-trailer-tmdb]').forEach(btn => {
    btn.onclick = () => openTrailer(parseInt(btn.getAttribute('data-trailer-tmdb'), 10), btn);
  });
}

function closeSuggestions() {
  suggestionsRoot.innerHTML = '';
}

async function openStats() {
  statsRoot.innerHTML = `
    <div class="stats-backdrop" id="stats-backdrop">
      <div class="stats-panel">
        <h3>Statistiques</h3>
        <div class="stats-empty">Calcul en cours...</div>
      </div>
    </div>
  `;
  document.getElementById('stats-backdrop').onclick = (e) => { if (e.target.id === 'stats-backdrop') closeStats(); };

  const res = await fetch(`${API}/api/stats`);
  const s = await res.json();

  const bar = (label, count, max) => `
    <div class="stats-bar-row">
      <div class="stats-bar-label">${escapeHtml(label)}</div>
      <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${max ? Math.round((count / max) * 100) : 0}%;"></div></div>
      <div class="stats-bar-count">${count}</div>
    </div>
  `;

  const genreMax = s.top_genres.length ? s.top_genres[0][1] : 0;
  const realMax = s.top_realisateurs.length ? s.top_realisateurs[0][1] : 0;
  const acteurMax = s.top_acteurs.length ? s.top_acteurs[0][1] : 0;
  const moisMax = s.vus_par_mois.length ? Math.max(...s.vus_par_mois.map(x => x[1])) : 0;

  document.querySelector('.stats-panel').innerHTML = `
    <h3>Statistiques</h3>
    <div class="stats-metrics">
      <div class="stats-metric"><div class="val">${s.total_films}</div><div class="lbl">TOTAL</div></div>
      <div class="stats-metric"><div class="val">${s.total_vus}</div><div class="lbl">VUS</div></div>
      <div class="stats-metric"><div class="val">${s.total_a_voir}</div><div class="lbl">A VOIR</div></div>
      <div class="stats-metric"><div class="val">${s.note_moyenne !== null ? s.note_moyenne : '--'}</div><div class="lbl">NOTE MOY.</div></div>
    </div>

    <div class="stats-section">
      <h4>Genres les plus vus</h4>
      ${s.top_genres.length ? s.top_genres.map(([g, c]) => bar(g, c, genreMax)).join('') : '<div class="stats-empty">Pas encore de film vu.</div>'}
    </div>

    <div class="stats-section">
      <h4>Realisateurs recurrents</h4>
      ${s.top_realisateurs.length ? s.top_realisateurs.map(([r, c]) => bar(r, c, realMax)).join('') : '<div class="stats-empty">Pas encore de donnees.</div>'}
    </div>

    <div class="stats-section">
      <h4>Acteurs recurrents</h4>
      ${s.top_acteurs.length ? s.top_acteurs.map(([a, c]) => bar(a, c, acteurMax)).join('') : '<div class="stats-empty">Pas encore de donnees.</div>'}
    </div>

    <div class="stats-section">
      <h4>Films vus par mois</h4>
      ${s.vus_par_mois.length ? s.vus_par_mois.map(([m, c]) => bar(m, c, moisMax)).join('') : '<div class="stats-empty">Pas encore de donnees.</div>'}
    </div>

    <button class="btn-cancel stats-close" id="stats-close">Fermer</button>
  `;
  document.getElementById('stats-close').onclick = closeStats;
}

function closeStats() {
  statsRoot.innerHTML = '';
}

loadFilms();
initToolbarGenreMS();
initToolbarPlatformMS();
toolbarDureeRange = setupDurationRange('duree', () => loadFilms());
loadPays();
</script>
</body>
</html>
